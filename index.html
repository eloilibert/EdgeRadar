<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f1419">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EdgeRadar Calc">
  <title>EdgeRadar Arbitrage Calculator</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="calc-panel" aria-label="Arbitrage calculator">
      <button class="calc-header" id="toggleButton" type="button" aria-expanded="true">
        ARBITRAGE CALCULATOR <span id="toggleIcon">▲</span>
      </button>

      <div class="calc-body" id="calculatorBody">
        <section class="entry-card" aria-label="Bet entries">
          <div class="table-head" aria-hidden="true">
            <span></span>
            <span>ODDS</span>
            <span>STAKE (EDITABLE)</span>
            <span>PAYOUT</span>
          </div>

          <div class="rows" id="betRows"></div>

          <div class="total-row">
            <label for="totalStake">TOTAL STAKE</label>
            <input id="totalStake" inputmode="decimal" autocomplete="off" placeholder="Enter total stake">
          </div>

          <div class="controls">
            <button type="button" class="ghost-btn" id="addBet">+ MORE BETS</button>
            <button type="button" class="ghost-btn" id="reset">RESET</button>
            <button type="button" class="primary-btn" id="calculate">CALCULATE</button>
          </div>
        </section>

        <aside class="summary-card" aria-label="Arbitrage summary">
          <div class="summary-box">
            <span>TOTAL PAYOUT</span>
            <strong id="totalPayout">0.00</strong>
          </div>
          <div class="summary-box">
            <span>TOTAL PROFIT</span>
            <strong id="totalProfit">0.00</strong>
          </div>
          <div class="summary-box">
            <span>ROI</span>
            <strong id="roi">0.00%</strong>
          </div>
          <p class="status-text" id="statusText">Enter at least 2 odds and a stake.</p>
        </aside>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
